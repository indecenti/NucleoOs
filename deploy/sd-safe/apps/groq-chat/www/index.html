<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Chat</title>
  <style>
    :root{
      --bg:#0b0f17; --bg2:var(--panel2,#0e131d); --panel:#131a26; --line:#1f2937; --line2:#273345;
      --text:#e6edf3; --muted:#8b98a9; --dim:#5b6675;
      --me:#1b2740; --accent:#7c5cff; --accent2:#4ea1ff; --ok:#5ad19b; --warn:#ffb454; --err:#ff8a9c;
      --mono: ui-monospace, "SF Mono", "JetBrains Mono", "Cascadia Code", Menlo, Consolas, monospace;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{display:flex;flex-direction:column;background:
      radial-gradient(1200px 500px at 80% -10%, #15203a55, transparent), var(--bg);
      color:var(--text); font:13.5px/1.5 var(--mono); -webkit-font-smoothing:antialiased}

    header{display:flex;align-items:center;gap:10px;padding:9px 12px;background:linear-gradient(180deg,var(--bg2),#0b0f1700);
      border-bottom:1px solid var(--line)}
    .mark{width:22px;height:22px;border-radius:7px;display:grid;place-items:center;color:#0b0f17;font-weight:700;font-size:11px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 0 16px #7c5cff44}
    header .t{display:flex;flex-direction:column;line-height:1.15;min-width:0}
    header .t b{font-size:13.5px;letter-spacing:.3px}
    header .t span{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:54vw}
    header .sp{flex:1}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--dim);flex:none}
    .dot.ok{background:var(--ok);box-shadow:0 0 8px #5ad19b88}
    .dot.err{background:var(--err)}
    .gear{border:1px solid var(--line2);background:transparent;color:var(--muted);width:28px;height:24px;border-radius:7px;cursor:pointer}
    .gear:hover{color:var(--text);background:#ffffff0d}

    #log{flex:1;overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:12px;scrollbar-width:thin}
    .turn{display:flex;gap:9px;align-items:flex-start;max-width:820px;width:100%}
    .turn .who{flex:none;width:18px;text-align:center;color:var(--dim);user-select:none;padding-top:1px}
    .turn .body{white-space:pre-wrap;word-break:break-word;min-width:0}
    .me .who{color:var(--accent2)}
    .me .body{color:var(--text)}
    .bot .who{color:var(--accent)}
    .sys .body{color:var(--muted);font-style:italic}
    .err .who{color:var(--err)} .err .body{color:var(--err)}
    .meta{display:block;margin-top:5px;color:var(--dim);font-size:10.5px;letter-spacing:.4px;text-transform:uppercase}
    .hint{color:var(--muted);font-size:11px;text-align:center;margin:2px 0 6px}
    .cursor{display:inline-block;width:7px;height:14px;margin-left:1px;background:var(--accent2);
      vertical-align:-2px;animation:bl 1s steps(1) infinite}
    @keyframes bl{50%{opacity:0}}
    pre.code{background:var(--field,#0a0e16);border:1px solid var(--line);border-radius:8px;padding:9px 11px;overflow:auto;margin:6px 0;font-size:12.5px}

    form{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--bg2);border-top:1px solid var(--line)}
    .prompt{color:var(--accent);font-weight:700}
    input,select,textarea{font:13.5px var(--mono)}
    #q{flex:1;border:0;background:transparent;color:var(--text);outline:none}
    #q::placeholder{color:var(--dim)}
    .send{border:1px solid var(--line2);background:#ffffff0d;color:var(--text);border-radius:7px;padding:5px 12px;cursor:pointer;font:600 12px var(--mono)}
    .send:hover{background:#ffffff16}
    .send[disabled]{opacity:.5;cursor:default}

    .settings{position:absolute;top:46px;right:12px;width:300px;max-width:calc(100vw - 24px);background:var(--panel);
      border:1px solid var(--line2);border-radius:10px;padding:13px;box-shadow:0 14px 40px #00000088;display:none;z-index:5}
    .settings.open{display:block}
    .settings h4{margin:0 0 10px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
    .fld{margin:10px 0}
    .fld label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px}
    .fld input,.fld select{width:100%;background:var(--field,#0a0e16);border:1px solid var(--line2);color:var(--text);border-radius:7px;padding:7px 9px;outline:none}
    .fld input:focus,.fld select:focus{border-color:var(--accent2)}
    .fld .hintline{font-size:10.5px;color:var(--dim);margin-top:4px}
    .rowbtn{display:flex;gap:7px;margin-top:6px}
    .rowbtn button{flex:1;border:1px solid var(--line2);background:#ffffff0d;color:var(--text);border-radius:7px;padding:6px;cursor:pointer;font:11px var(--mono)}
    .rowbtn button:hover{background:#ffffff16}
    .danger{width:100%;margin-top:8px;border:1px solid #5b2330;background:#2a131a;color:#ff9aa6;border-radius:7px;padding:6px;cursor:pointer;font:11px var(--mono)}
    .danger:hover{background:#371821}
    a{color:var(--accent2)}
  </style>
</head>
<body>
  <header>
    <div class="mark">AI</div>
    <div class="t"><b>AI Chat</b><span id="sub">—</span></div>
    <div class="sp"></div>
    <div class="dot" id="dot" title="status"></div>
    <button class="gear" id="gear" title="settings">⚙</button>
  </header>

  <div class="settings" id="settings">
    <h4>Connessione</h4>
    <div class="fld">
      <label for="key">API key (Groq)</label>
      <input id="key" type="password" autocomplete="off" spellcheck="false" placeholder="gsk_…">
      <div class="hintline">Resta solo nel browser (localStorage). Crea/gestisci su <a href="https://console.groq.com/keys" target="_blank" rel="noreferrer noopener">console.groq.com/keys</a>.</div>
    </div>
    <div class="fld">
      <label for="base">Endpoint (OpenAI-compatibile)</label>
      <input id="base" type="text" autocomplete="off" spellcheck="false" placeholder="https://api.groq.com/openai/v1">
    </div>
    <div class="fld">
      <label for="model">Modello</label>
      <select id="model"></select>
      <div class="rowbtn">
        <button id="refresh">↻ Aggiorna modelli</button>
        <button id="clear">Pulisci chat</button>
      </div>
    </div>
    <div class="fld">
      <label>Teacher ANIMA (apprendimento offline del device)</label>
      <div class="rowbtn">
        <button id="teach-on">Abilita con questa key</button>
        <button id="teach-off">Disabilita</button>
      </div>
      <div class="hintline" id="teach-status">—</div>
    </div>
    <button class="danger" id="forget">Dimentica la chiave</button>
  </div>

  <div id="log"></div>

  <form id="f">
    <span class="prompt">›</span>
    <input id="q" autocomplete="off" autofocus placeholder="Scrivi al modello…">
    <button class="send" id="send" type="submit">Invia</button>
  </form>

  <script type="module">
    // ---- AI Chat: talks directly to a Groq (OpenAI-compatible) endpoint from the browser.
    // For now this is the MODEL ALONE — no on-device ANIMA in the loop (that wiring comes later,
    // as ANIMA's teacher tier, docs/anima-online.md §4). The API key lives only in localStorage.
    const DEFAULT_BASE  = 'https://api.groq.com/openai/v1';
    const DEFAULT_MODEL = 'llama-3.1-8b-instant';
    // Known Groq chat models as a fallback list until /models is fetched live.
    const SEED_MODELS = [
      'llama-3.1-8b-instant', 'llama-3.3-70b-versatile', 'openai/gpt-oss-20b', 'openai/gpt-oss-120b',
      'gemma2-9b-it', 'qwen-2.5-32b', 'deepseek-r1-distill-llama-70b',
    ];

    const get = (k, d) => { try { const v = localStorage.getItem(k); return v === null ? d : v; } catch { return d; } };
    const set = (k, v) => { try { localStorage.setItem(k, v); } catch {} };
    const del = (k)    => { try { localStorage.removeItem(k); } catch {} };

    const S = {
      key:   get('groq.key', ''),
      base:  get('groq.base', DEFAULT_BASE).replace(/\/+$/, ''),
      model: get('groq.model', DEFAULT_MODEL),
    };
    let messages = [];   // running conversation [{role, content}] — model-only, no system tricks
    let busy = false;

    const $ = id => document.getElementById(id);
    const logEl = $('log'), input = $('q'), sendBtn = $('send'), dot = $('dot');
    const esc = s => (s || '').replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));

    // Minimal, safe rendering: escape everything, then lift ```fenced``` blocks into <pre>.
    function render(el, text) {
      const parts = String(text).split(/```/);
      el.innerHTML = '';
      parts.forEach((p, i) => {
        if (i % 2 === 1) {
          const pre = document.createElement('pre'); pre.className = 'code';
          pre.textContent = p.replace(/^[a-z0-9+#.-]*\n/i, '');   // drop a leading language tag line
          el.appendChild(pre);
        } else if (p) {
          el.appendChild(document.createTextNode(p));
        }
      });
    }

    function setStatus() {
      $('sub').textContent = S.model + (S.key ? '' : ' · imposta la chiave ⚙');
      dot.className = 'dot' + (S.key ? ' ok' : ' err');
      document.title = 'AI Chat · ' + S.model;
    }

    function row(kind, who) {
      const d = document.createElement('div'); d.className = 'turn ' + kind;
      const body = document.createElement('div'); body.className = 'body';
      d.innerHTML = `<div class="who">${who}</div>`; d.appendChild(body);
      logEl.appendChild(d); logEl.scrollTop = logEl.scrollHeight;
      return body;
    }
    const addUser = t => { const b = row('me', '›'); b.textContent = t; };
    const addSys  = t => { const b = row('sys', '·'); b.textContent = t; };
    const addErr  = t => { const b = row('err', '✕'); b.textContent = t; };

    function hello() {
      logEl.innerHTML = '';
      const h = document.createElement('div'); h.className = 'hint';
      h.textContent = 'Parli direttamente col modello (Groq). Nessuna elaborazione ANIMA.';
      logEl.appendChild(h);
      if (!S.key) addSys('Imposta la tua API key in ⚙ per iniziare.');
    }

    // ---- Groq calls (via the device's same-origin /api/llm proxy) ------------
    // The web app is served BY the device/simulator, so routing through /api/llm sidesteps the
    // browser's CORS wall entirely (the same trick /api/proxy uses for the Browser app). The
    // proxy forwards our Authorization header + body to `url` and streams the response back.
    function authHeaders() { return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + S.key }; }
    const LLM = (apiPath) => '/api/llm?url=' + encodeURIComponent(S.base + apiPath);

    async function fetchModels() {
      const sel = $('model');
      const fill = (ids) => {
        const uniq = [...new Set(ids)].filter(Boolean).sort();
        sel.innerHTML = '';
        for (const id of uniq) { const o = document.createElement('option'); o.value = id; o.textContent = id; sel.appendChild(o); }
        if (!uniq.includes(S.model)) { const o = document.createElement('option'); o.value = S.model; o.textContent = S.model; sel.appendChild(o); }
        sel.value = S.model;
      };
      fill(SEED_MODELS.concat([S.model]));            // seed first so the picker is never empty
      if (!S.key) return;
      try {
        const r = await fetch(LLM('/models'), { headers: authHeaders() });
        if (!r.ok) return;
        const j = await r.json();
        const ids = (j.data || []).map(m => m.id)
          .filter(id => !/whisper|tts|guard/i.test(id));   // drop audio/moderation-only models
        if (ids.length) fill(ids);
      } catch { /* offline / CORS: keep the seed list */ }
    }

    // Stream a chat completion (SSE). Appends deltas into `bodyEl`. Returns the full text.
    async function streamChat(bodyEl) {
      const cur = document.createElement('span'); cur.className = 'cursor'; bodyEl.appendChild(cur);
      const resp = await fetch(LLM('/chat/completions'), {
        method: 'POST', headers: authHeaders(),
        body: JSON.stringify({ model: S.model, messages, stream: true }),
      });
      if (!resp.ok || !resp.body) {
        let detail = ''; try { detail = (await resp.text()).slice(0, 300); } catch {}
        cur.remove();
        throw new Error('HTTP ' + resp.status + (detail ? ' · ' + detail : ''));
      }
      const reader = resp.body.getReader(), dec = new TextDecoder();
      let buf = '', full = '';
      for (;;) {
        const { value, done } = await reader.read();
        if (done) break;
        buf += dec.decode(value, { stream: true });
        let nl;
        while ((nl = buf.indexOf('\n')) >= 0) {
          const line = buf.slice(0, nl).trim(); buf = buf.slice(nl + 1);
          if (!line.startsWith('data:')) continue;
          const data = line.slice(5).trim();
          if (data === '[DONE]') { buf = ''; break; }
          try {
            const piece = JSON.parse(data).choices?.[0]?.delta?.content;
            if (piece) { full += piece; render(bodyEl, full); bodyEl.appendChild(cur); logEl.scrollTop = logEl.scrollHeight; }
          } catch { /* ignore keep-alive / partial frames */ }
        }
      }
      cur.remove();
      render(bodyEl, full);
      return full;
    }

    async function ask(text) {
      text = text.trim();
      if (!text || busy) return;
      if (!S.key) { addSys('Serve una API key — aprila in ⚙.'); $('settings').classList.add('open'); $('key').focus(); return; }
      busy = true; sendBtn.disabled = true;
      addUser(text);
      messages.push({ role: 'user', content: text });
      while (messages.length > 40) messages.shift();   // soft context cap -> bounded request body
      const body = row('bot', '◆');
      const t0 = performance.now();
      try {
        const full = await streamChat(body);
        messages.push({ role: 'assistant', content: full });
        const m = document.createElement('span'); m.className = 'meta';
        m.textContent = `${S.model} · ${Math.round(performance.now() - t0)} ms`;
        body.appendChild(m);
      } catch (e) {
        body.parentElement.remove();
        messages.pop();                              // don't keep a turn we couldn't answer
        const msg = String(e.message || e);
        addErr(msg);
        if (/Failed to fetch|NetworkError/i.test(msg))
          addSys('Non raggiungo il proxy /api/llm del dispositivo. Avvia il simulatore (node tools/serve-shell.mjs) o verifica la connessione del device.');
        else if (/401|invalid_api_key|403/i.test(msg))
          addSys('Chiave non valida o non autorizzata — controllala in ⚙.');
        else if (/404|no.*handler|not found/i.test(msg))
          addSys('Endpoint /api/llm assente: aggiorna il firmware/simulatore con il proxy LLM.');
      } finally {
        busy = false; sendBtn.disabled = false; logEl.scrollTop = logEl.scrollHeight; input.focus();
      }
    }

    // ---- wiring --------------------------------------------------------------
    $('f').addEventListener('submit', e => { e.preventDefault(); const q = input.value; input.value = ''; ask(q); });

    const panel = $('settings');
    $('gear').addEventListener('click', () => { panel.classList.toggle('open'); if (panel.classList.contains('open')) $('key').focus(); });
    document.addEventListener('click', e => { if (!panel.contains(e.target) && e.target.id !== 'gear') panel.classList.remove('open'); });

    $('key').value = S.key; $('base').value = S.base;
    $('key').addEventListener('change', () => { S.key = $('key').value.trim(); set('groq.key', S.key); setStatus(); fetchModels(); });
    $('base').addEventListener('change', () => { S.base = ($('base').value.trim() || DEFAULT_BASE).replace(/\/+$/, ''); set('groq.base', S.base); fetchModels(); });
    $('model').addEventListener('change', () => { S.model = $('model').value; set('groq.model', S.model); setStatus(); });
    $('refresh').addEventListener('click', () => fetchModels());
    $('clear').addEventListener('click', () => { messages = []; panel.classList.remove('open'); hello(); input.focus(); });
    $('forget').addEventListener('click', () => { S.key = ''; del('groq.key'); $('key').value = ''; setStatus(); panel.classList.remove('open'); addSys('Chiave dimenticata.'); });

    // ---- ANIMA teacher provisioning: write the key the DEVICE reads (/data/anima/teacher.json) ----
    // This is the same Groq key, pushed to the programmatic ANIMA so it can learn (verified) from
    // misses. /api/fs is pairing-gated; the iframe is same-origin so the session cookie rides along.
    const TEACHER_PATH = '/data/anima/teacher.json';
    async function teachStatus() {
      const el = document.getElementById('teach-status');
      try {
        const r = await fetch('/api/fs/read?path=' + encodeURIComponent(TEACHER_PATH));
        if (r.ok) { const k = (JSON.parse(await r.text()) || {}).key;
          el.textContent = k ? 'Attivo — ANIMA impara dai miss (offline, solo fatti verificati su fonte).' : 'Disattivo.'; return; }
      } catch {}
      el.textContent = 'Disattivo — ANIMA resta offline puro.';
    }
    async function teachWrite(obj) {
      try { const r = await fetch('/api/fs/write?path=' + encodeURIComponent(TEACHER_PATH), { method: 'POST', body: JSON.stringify(obj) }); return r.ok; }
      catch { return false; }
    }
    document.getElementById('teach-on').addEventListener('click', async () => {
      if (!S.key) { document.getElementById('teach-status').textContent = 'Inserisci prima la API key qui sopra.'; return; }
      const ok = await teachWrite({ key: S.key, base: S.base, model: S.model });
      document.getElementById('teach-status').textContent = ok
        ? 'Abilitato ✓ — solo i fatti verificati finiscono negli ODD; il resto resta effimero.'
        : 'Errore di scrittura (device non accoppiato?).';
    });
    document.getElementById('teach-off').addEventListener('click', async () => {
      const ok = await teachWrite({ key: '' });
      document.getElementById('teach-status').textContent = ok ? 'Disabilitato.' : 'Errore di scrittura.';
    });

    setStatus(); hello(); fetchModels(); teachStatus(); input.focus();
  </script>
</body>
</html>
