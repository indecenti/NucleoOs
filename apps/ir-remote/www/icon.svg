<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="ir-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a1230"/>
      <stop offset="1" stop-color="#1a0a1e"/>
    </linearGradient>
    <linearGradient id="ir-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b3a5e"/>
