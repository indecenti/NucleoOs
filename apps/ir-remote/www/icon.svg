  <rect x="33" y="49" width="4" height="4" rx="1.2" fill="#6f86b8"/>
  <!-- IR waves -->
  <g fill="none" stroke="#ff7a5c" stroke-width="2.4" stroke-linecap="round" opacity="0.95">
    <path d="M40 12 q5 6 0 12"/>
