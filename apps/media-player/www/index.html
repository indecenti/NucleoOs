<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Media Player</title>
  <style>
    :root { --bg:#0e1830; --panel:#18233a; --text:#e8eefc; --muted:#8aa0c8; --accent:#4ea1ff; --line:#2a3a5e; }
    * { box-sizing: border-box; } html, body { height: 100%; margin: 0; }
    body { display: flex; flex-direction: column; background: var(--bg); color: var(--text); font: 14px system-ui, sans-serif; }
    header { padding: 8px 10px; background: var(--panel); border-bottom: 1px solid var(--line); font-weight: 600; }
    audio { width: calc(100% - 20px); margin: 10px; }
    ul { list-style: none; margin: 0; padding: 0; flex: 1; overflow: auto; }
    li { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #ffffff0a; display: flex; gap: 8px; }
    li:hover { background: #ffffff12; } li.active { background: #ffffff1c; color: var(--accent); }
    .muted { color: var(--muted); font-size: 12px; padding: 6px 12px; }
  </style>
</head>
<body>
  <header>🎵 <span data-i18n="app_title">Media Player</span></header>
  <audio id="player" controls></audio>
  <div class="muted" data-i18n="library_hint">Library · /data/Music — decoded by your browser</div>
  <ul id="list"></ul>
  <script type="module">
    import I18N from '/nucleo-i18n.js';
    const t = await I18N.init('media-player');
    const DIR = '/data/Music';
    const player = document.getElementById('player');
    const list = document.getElementById('list');
    const src = (p) => '/api/fs/read?path=' + encodeURIComponent(p);
    function play(path, li) {
      player.src = src(path); player.play().catch(() => {});
      [...list.children].forEach(c => c.classList.remove('active')); li && li.classList.add('active');
    }
    async function load() {
      let data; try { data = await (await fetch('/api/fs/list?path=' + encodeURIComponent(DIR))).json(); } catch { return; }
      const tracks = (data.entries || []).filter(e => e.type === 'file' && /\.(mp3|wav)$/i.test(e.name));
      list.innerHTML = tracks.length ? '' : '<li class="muted" data-i18n="empty_list">No audio in /data/Music</li>';
      for (const t of tracks) {
        const li = document.createElement('li');
        li.innerHTML = `<span>♪</span><span>${t.name}</span>`;
        li.onclick = () => play(DIR + '/' + t.name, li);
        list.appendChild(li);
      }
    }
    const q = new URLSearchParams(location.search).get('path');
    if (q) play(q);
    load();
  </script>
</body>
</html>
