    const aside = document.getElementById('side'), resizer = document.getElementById('resizer');
    const savedW = parseInt(localStorage.getItem('fc.sidew') || '', 10);
    if (savedW >= 160 && savedW <= 520) aside.style.width = savedW + 'px';
    let rz = null;
    resizer.onpointerdown = (e) => { rz = { x: e.clientX, w: aside.getBoundingClientRect().width }; resizer.classList.add('drag'); resizer.setPointerCapture(e.pointerId); };
    resizer.onpointermove = (e) => { if (!rz) return; let w = Math.max(160, Math.min(520, Math.round(rz.w + (e.clientX - rz.x)))); aside.style.width = w + 'px'; };
    resizer.onpointerup = () => { if (!rz) return; rz = null; resizer.classList.remove('drag'); localStorage.setItem('fc.sidew', String(parseInt(aside.style.width, 10) || 230)); };

    // Native bridge present (NucleoConnect): auto-list the real connected drives.
    async function loadDrives() {
      if (!bridge) return;
      try {
        const raw = await bridge.Drives();
        const arr = typeof raw === 'string' ? JSON.parse(raw) : raw;
        for (const d of (arr || [])) {
          const root = d.path || (d.name + ':\\');
          locals.push({ id: 'drv:' + root, kind: 'local', src: 'bridge', glyph: d.glyph || '💽',
            label: d.label || d.name || root, root, path: root, removable: false, writable: true });
        }
        renderSidebar();
      } catch (err) { console.warn('drive list failed', err); }
    }
    // Browser fallback: let the user grant a folder/drive via the File System Access API.
    async function addLocalViaPicker() {
      if (!fsaSupported) return;
      let handle; try { handle = await window.showDirectoryPicker({ mode: 'readwrite' }); } catch { return; }   // user cancelled
      let perm = 'granted';
      try { perm = await handle.queryPermission({ mode: 'readwrite' }); if (perm !== 'granted') perm = await handle.requestPermission({ mode: 'readwrite' }); } catch { perm = 'denied'; }
      const loc = { id: 'fsa:' + handle.name + ':' + Math.random().toString(36).slice(2), kind: 'local',
        src: 'fsa', glyph: '📂', label: handle.name, stack: [handle], path: handle.name, removable: true, writable: perm === 'granted' };
      locals.push(loc); renderSidebar(); switchTo(loc);
    }
    document.getElementById('add-loc').onclick = addLocalViaPicker;
    // The add-folder button's TITLE depends on capability; keep it accurate and re-render on language switch.
    const syncAddLocTitle = () => { document.getElementById('add-loc').title = bridge ? t('add_folder_only') : (fsaSupported ? t('add_folder_title') : t('add_unsupported')); };
    syncAddLocTitle();
    if (!bridge && !fsaSupported) document.getElementById('add-loc').disabled = true;

    document.getElementById('up').onclick = () => {
      if (isSD()) { if (cwd !== '/') { cwd = parent(cwd); selected.clear(); load(); } }
      else if (!localAtRoot(ACTIVE)) { localUp(ACTIVE); selected.clear(); load(); }
    };
    document.getElementById('tosd').onclick = copyToSD;
    document.getElementById('refresh').onclick = load;
    document.getElementById('newfolder').onclick = newFolder;
    const findEl = document.getElementById('find'); findEl.oninput = () => { filterText = findEl.value; render(); };
    // Preview/inspection hook (harness only; mirrors the device apps' _debugState). Lets a test
    // mount a real FileSystemDirectoryHandle as a local location without the native picker dialog.
    window._fc = {
      state: () => ({ active: ACTIVE.id, kind: ACTIVE.kind, locals: locals.map((l) => l.id), cwd, sdPath, names: entries.map((e) => e.name) }),
      mountFsa: (handle, label, writableFlag = true) => { const loc = { id: 'fsa:test', kind: 'local', src: 'fsa', glyph: '📂', label: label || handle.name, stack: [handle], path: handle.name, removable: true, writable: writableFlag }; locals.push(loc); renderSidebar(); switchTo(loc); return loc.id; },
      goSD: () => switchTo(SD_LOC),
      go: (id) => { const l = id === 'sd' ? SD_LOC : locals.find((x) => x.id === id); if (l) switchTo(l); },
    };

    // Live language switch: the engine repaints [data-i18n] nodes automatically; refresh the bits we
    // build imperatively (status hint, item count, sidebar labels, the add-folder title).
    I18N.onChange(() => { syncToolbar(); updateCount(view().length); renderSidebar(); syncAddLocTitle(); });

    renderSidebar(); loadDrives(); load();
  </script>
</body>
</html>
